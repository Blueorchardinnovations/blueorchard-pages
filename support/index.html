<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support | Blue Orchard Innovations</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="container">
    <div class="page-nav">
      <a href="https://legal.blueorchardinnovations.com/">Home</a>
      <a href="javascript:history.back()">Back</a>
    </div>


    <h1>Support</h1>
    <p class="subtitle">
      Select your app to get the appropriate support contact.
    </p>

    <label for="appSelect">Choose an App:</label>
    <select id="appSelect" onchange="updateSupport()">
      <option value="insights">Blue Orchard Insights</option>
      <option value="evites">Blue Orchard Evites</option>
    </select>

    <div class="box">
      <div id="supportContent">
        <p>Need help with Blue Orchard Insights?</p>
        <p class="email">
          <a href="mailto:support@blueorchardinnovations.com">
            support@blueorchardinnovations.com
          </a>
        </p>
      </div>
    </div>

    <footer>
      © 2026 Blue Orchard Innovations, Inc.
    </footer>
  </div>

  <script>
    function updateSupport() {
      const app = document.getElementById("appSelect").value;
      const content = document.getElementById("supportContent");

      if (app === "insights") {
        content.innerHTML = `
          <p>Need help with <strong>Blue Orchard Insights</strong>?</p>
          <p class="email">
            <a href="mailto:support@blueorchardinnovations.com">
              support@blueorchardinnovations.com
            </a>
          </p>
        `;
      } else {
        content.innerHTML = `
          <p>Need help with <strong>Blue Orchard Evites</strong>?</p>
          <p class="email">
            <a href="mailto:support@blueorchardinnovations.com">
              support@blueorchardinnovations.com
            </a>
          </p>
        `;
      }
    }
  </script>
</body>
</html>
