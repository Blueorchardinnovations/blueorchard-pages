<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support | Blue Orchard Innovations</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f6f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 10px;
      color: #0f172a;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }

    .box {
      background: #eef2ff;
      padding: 20px;
      border-radius: 10px;
    }

    .email {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Support</h1>
    <p class="subtitle">
      Select your app to get the appropriate support contact.
    </p>

    <label for="appSelect">Choose an App:</label>
    <select id="appSelect" onchange="updateSupport()">
      <option value="insights">Blue Orchard Insights</option>
      <option value="evites">Blue Orchard Evites</option>
    </select>

    <div class="box">
      <div id="supportContent">
        <p>Need help with Blue Orchard Insights?</p>
        <p class="email">
          <a href="mailto:support@blueorchardinnovations.com">
            support@blueorchardinnovations.com
          </a>
        </p>
      </div>
    </div>

    <footer>
      © 2026 Blue Orchard Innovations, Inc.
    </footer>
  </div>

  <script>
    function updateSupport() {
      const app = document.getElementById("appSelect").value;
      const content = document.getElementById("supportContent");

      if (app === "insights") {
        content.innerHTML = `
          <p>Need help with <strong>Blue Orchard Insights</strong>?</p>
          <p class="email">
            <a href="mailto:support@blueorchardinnovations.com">
              support@blueorchardinnovations.com
            </a>
          </p>
        `;
      } else {
        content.innerHTML = `
          <p>Need help with <strong>Blue Orchard Evites</strong>?</p>
          <p class="email">
            <a href="mailto:support@blueorchardinnovations.com">
              support@blueorchardinnovations.com
            </a>
          </p>
        `;
      }
    }
  </script>
</body>
</html>
