<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blue Orchard Innovations</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f6f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 10px;
      color: #0f172a;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 30px;
    }

    .app {
      margin-bottom: 35px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .app:last-child {
      border-bottom: none;
    }

    h2 {
      margin-bottom: 10px;
      color: #1e293b;
    }

    .links a {
      display: inline-block;
      margin-right: 15px;
      margin-top: 5px;
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }

    .links a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Blue Orchard Innovations, Inc.</h1>
    <p class="subtitle">
      Public information, legal documents, and support resources for Blue Orchard applications.
    </p>

    <div class="app">
      <h2>Blue Orchard Insights</h2>
      <div class="links">
        <a href="/blue-orchard-insights/privacy/">Privacy Policy</a>
        <a href="/blue-orchard-insights/terms/">Terms of Use</a>
        <a href="/blue-orchard-insights/faqs/">FAQs</a>
      </div>
    </div>

    <div class="app">
      <h2>Blue Orchard Evites</h2>
      <div class="links">
        <a href="/blue-orchard-evites/privacy/">Privacy Policy</a>
        <a href="/blue-orchard-evites/terms/">Terms of Use</a>
      </div>
    </div>

    <footer>
      © 2026 Blue Orchard Innovations, Inc.
    </footer>
  </div>
</body>
</html>
